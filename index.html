<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beaute Ethical</title>
    <script>
      // GitHub Pages SPA redirect receiver: restore the path from the query string
      (function() {
        var redirect = window.location.search.slice(1).split('&').reduce(function(r, kv) {
          var pair = kv.split('=');
          return pair[0] === 'p' ? decodeURIComponent(pair[1]) : r;
        }, null);
        if (redirect) {
          window.history.replaceState(null, null,
            window.location.pathname.slice(0, -1) + (redirect.charAt(0) === '/' ? '' : '/') + redirect
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
